site_name: Risk Management
site_description: Applied Risk Management — Concepts, Models, and Cases
site_author: Zachary Smith
site_url: https://yourname.github.io/risk-management

theme:
  name: material
  features:
    - navigation.sections
    - navigation.indexes
    - navigation.instant
    - search.highlight
    - content.code.copy

markdown_extensions:
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.highlight
  - pymdownx.superfences
  - pymdownx.details
  - admonition
  - toc:
      permalink: true

plugins:
  - search

nav:
  - Home: index.md
  - Foundations:
      - Overview: foundations/index.md
      - Risk vs Uncertainty: foundations/risk_vs_uncertainty.md
      - Return Distributions: foundations/distributions.md
      - Stylized Facts: foundations/stylized_facts.md
  - Market Risk:
      - Overview: market_risk/index.md
      - Volatility Models: market_risk/volatility.md
      - Value at Risk (VaR): market_risk/var.md
      - Expected Shortfall (CVaR): market_risk/cvar.md
  - Credit Risk:
      - Overview: credit_risk/index.md
      - Structural Models (Merton): credit_risk/merton.md
      - Reduced‑Form Models: credit_risk/intensity.md
  - Stress Testing:
      - Overview: stress_testing/index.md
      - Historical Scenarios: stress_testing/historical.md
      - Macroeconomic Stress Tests: stress_testing/macro.md
  - Tools:
      - Overview: tools/index.md
      - Python for Risk: tools/python_intro.md
      - Monte Carlo Simulation: tools/monte_carlo.md
      - Risk Dashboards: tools/dashboards.md
  - Case Studies:
      - Overview: cases/index.md
      - LTCM: cases/ltcm.md
      - Global Financial Crisis (2008): cases/gfc.md
